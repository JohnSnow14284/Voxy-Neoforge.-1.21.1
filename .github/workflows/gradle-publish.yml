name: Build Minecraft Mod (NeoForge)

on:
  workflow_dispatch:   # 手动触发
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build mod with Gradle
        run: ./gradlew build --no-daemon

      # 调试：列出所有生成的 JAR 文件（确认文件存在）
      - name: List generated JARs
        run: |
          echo "=== JAR files in build/libs ==="
          ls -la build/libs/ || echo "build/libs/ directory not found"
          echo "=== All JAR files in workspace ==="
          find . -name "*.jar" -type f

      # 上传所有 JAR 文件（包括主 JAR 和 sources JAR）
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: voxy-mod-jars
          path: build/libs/*.jar
          if-no-files-found: error   # 如果没有匹配到任何 JAR，该步骤失败
