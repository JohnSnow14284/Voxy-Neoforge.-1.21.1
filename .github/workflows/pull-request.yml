# Voxy NeoForge Pull Request Validation
# Stricter validation for external contributions with read-only caches

name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR sources
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle (read-only cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Build and validate
        run: ./gradlew clean build --console=plain
        env:
          GITHUB_ACTIONS: true

      - name: Validation summary
        if: success()
        run: |
          echo "## ✓ Build Validation Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Gradle wrapper: validated" >> $GITHUB_STEP_SUMMARY
          echo "- Compilation: successful" >> $GITHUB_STEP_SUMMARY
          echo "- Mixin validation: passed" >> $GITHUB_STEP_SUMMARY
          echo "- Access transformer validation: passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifact: \`$(ls build/libs/*.jar | xargs basename)\`" >> $GITHUB_STEP_SUMMARY
          echo "Size: \`$(du -h build/libs/*.jar | cut -f1)\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload PR artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: voxy-pr-${{ github.event.pull_request.number }}
          path: build/libs/*.jar
          retention-days: 14
